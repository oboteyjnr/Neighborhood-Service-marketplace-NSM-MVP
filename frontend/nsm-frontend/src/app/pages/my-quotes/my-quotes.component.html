<section class="card">
	<div class="page-header">
		<h2>My Quotes</h2>
		<button type="button" class="secondary-btn" (click)="logout()" [disabled]="loggingOut">
			{{ loggingOut ? 'Logging out...' : 'Logout' }}
		</button>
	</div>
	<div class="error" *ngIf="error">{{ error }}</div>
	<div *ngIf="loading">Loading...</div>
	<div *ngIf="!loading && !error && !quotes.length">No quotes yet.</div>

	<div *ngFor="let quote of quotes" class="card">
		<div>Request: {{ getRequestLabel(quote) }}</div>
		<div>Price: {{ quote.price }}</div>
		<div>Days: {{ quote.daysToComplete }}</div>
		<div>Status: {{ quote.status }}</div>
		<button type="button" (click)="openRequest(quote)">View Request</button>
	</div>
</section>
